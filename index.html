<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级作业查询系统-登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
        body{background:#f0f5ff;display:flex;justify-content:center;align-items:center;height:100vh;}
        .login-box{width:350px;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 20px #ccc;}
        h2{text-align:center;margin-bottom:30px;color:#2c5282;}
        .input-item{margin:18px 0;}
        label{display:block;margin-bottom:8px;color:#444;}
        input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
        button{width:100%;padding:13px;background:#3182ce;color:#fff;border:none;border-radius:6px;font-size:17px;cursor:pointer;margin-top:10px;}
        button:hover{background:#2b6cb0;}
        .tip{margin-top:20px;text-align:center;color:#888;font-size:14px;}
        .error{color:red;text-align:center;margin-top:15px;display:none;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>班级作业查询登录</h2>
        <div class="input-item">
            <label>学号(1-52)</label>
            <input type="number" id="stuId" placeholder="请输入学号">
        </div>
        <div class="input-item">
            <label>密码</label>
            <input type="password" id="pwd" placeholder="初始密码为学号">
        </div>
        <div class="error" id="errText">学号或密码错误！</div>
        <button onclick="login()">立即登录</button>
        <div class="tip">提示：密码默认与学号一致<br>21号账号拥有作业编辑权限</div>
    </div>

    <script>
        // 登录校验
        function login(){
            let id = document.getElementById('stuId').value;
            let pwd = document.getElementById('pwd').value;
            let err = document.getElementById('errText');
            err.style.display = 'none';

            let numId = parseInt(id);
            // 学号范围1-52
            if(isNaN(numId) || numId<1 || numId>52){
                err.innerText = '学号必须为1-52数字';
                err.style.display = 'block';
                return;
            }
            // 密码等于学号
            if(id !== pwd){
                err.innerText = '密码错误，初始密码为学号';
                err.style.display = 'block';
                return;
            }

            // 存储登录学号
            localStorage.setItem('loginStuId',numId);
            // 判断管理员跳转编辑页，普通学生跳转查看页
            if(numId === 21){
                window.location.href = 'admin.html';
            }else{
                window.location.href = 'student.html';
            }
        }
    </script>
</body>
</html>
